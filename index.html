<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Editing Queue — Blake Nelson</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f4f0;
    --color-background-info: #e6f1fb;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-text-tertiary: #888780;
    --color-text-info: #185fa5;
    --color-text-danger: #a32d2d;
    --color-border-tertiary: rgba(0,0,0,0.12);
    --color-border-secondary: rgba(0,0,0,0.22);
    --color-border-info: rgba(24,95,165,0.35);
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1e1e1c;
      --color-background-secondary: #2c2c2a;
      --color-background-info: #042c53;
      --color-text-primary: #f0ede6;
      --color-text-secondary: #b4b2a9;
      --color-text-tertiary: #888780;
      --color-text-info: #85b7eb;
      --color-text-danger: #f09595;
      --color-border-tertiary: rgba(255,255,255,0.1);
      --color-border-secondary: rgba(255,255,255,0.2);
      --color-border-info: rgba(133,183,235,0.35);
    }
  }
  body { font-family: var(--font-sans); background: var(--color-background-primary); color: var(--color-text-primary); padding: 1.5rem; max-width: 820px; margin: 0 auto; }
  .top-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 10px; }
  .tab-btns { display: flex; gap: 6px; align-items: center; }
  .tab-btn { font-size: 13px; padding: 5px 14px; border: 0.5px solid var(--color-border-tertiary); border-radius: 20px; background: transparent; color: var(--color-text-secondary); cursor: pointer; }
  .tab-btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
  .sync-status { font-size: 11px; color: var(--color-text-tertiary); padding: 4px 8px; border-radius: 20px; background: var(--color-background-secondary); }
  .sync-status.syncing { color: var(--color-text-info); }
  .sync-status.error { color: var(--color-text-danger); }
  .stats { display: flex; gap: 8px; flex-wrap: wrap; }
  .stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 12px; font-size: 12px; color: var(--color-text-secondary); cursor: pointer; border: 0.5px solid transparent; }
  .stat:hover { border-color: var(--color-border-secondary); }
  .stat.active { border-color: var(--color-border-info); color: var(--color-text-info); }
  .stat.active span { color: var(--color-text-info); }
  .stat span { font-size: 17px; font-weight: 500; color: var(--color-text-primary); display: block; }
  .add-bar-top { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .add-bar-top input[type="text"] { flex: 2; min-width: 160px; font-size: 14px; padding: 8px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
  .add-bar-top select { flex: 1; min-width: 110px; font-size: 14px; padding: 8px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
  .add-bar-dates { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: flex-end; }
  .field-wrap { display: flex; flex-direction: column; gap: 4px; min-width: 155px; flex: 1; }
  .field-wrap label { font-size: 11px; color: var(--color-text-tertiary); padding-left: 2px; }
  .field-wrap input[type="date"] { width: 100%; min-width: 155px; font-size: 14px; padding: 8px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
  .add-btn { white-space: nowrap; font-size: 14px; padding: 8px 16px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-primary); cursor: pointer; align-self: flex-end; flex-shrink: 0; }
  .add-btn:hover { background: var(--color-background-secondary); }
  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { font-size: 12px; padding: 4px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: 20px; background: transparent; color: var(--color-text-secondary); cursor: pointer; }
  .filter-btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
  .sort-bar { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .sort-label { font-size: 12px; color: var(--color-text-tertiary); }
  .sort-btn { font-size: 12px; padding: 4px 10px; border: 0.5px solid var(--color-border-tertiary); border-radius: 20px; background: transparent; color: var(--color-text-secondary); cursor: pointer; }
  .sort-btn.active { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-secondary); }
  .sort-btn:hover { background: var(--color-background-secondary); }
  .job-list { display: flex; flex-direction: column; gap: 8px; }
  .job { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 12px 14px; display: flex; align-items: center; gap: 12px; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; touch-action: pan-y; }
  .job-info * { user-select: none; -webkit-user-select: none; pointer-events: none; }
  .job-info select, .job-info .badge, .job-info .date-pill, .job-info .status-select { pointer-events: auto; }
  .job-info { flex: 1; min-width: 0; }
  .job.status-culling { background: #FFFDE7; border-color: #FFF176; }
  .job.status-editing { background: #FFF3CD; border-color: #FFCA28; }
  .job.status-delivery { background: #EAF3DE; border-color: #639922; }
  @media (prefers-color-scheme: dark) {
    .job.status-culling { background: #2a2810; border-color: #5a5415; }
    .job.status-editing { background: #2e1f08; border-color: #b8860b; }
    .job.status-delivery { background: #173404; border-color: #3B6D11; }
  }
  .job.dragging { opacity: 0.4; }
  .job.drag-over { border-color: var(--color-border-info); }
  .job.done { opacity: 0.45; }
  .job-drag { color: var(--color-text-tertiary); cursor: grab; font-size: 14px; flex-shrink: 0; }
  .job-drag.disabled { opacity: 0.2; cursor: default; }

  .job-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: context-menu; user-select: none; }
  .job-meta { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .badge { display: inline-flex; align-items: center; justify-content: center; font-size: 11px; padding: 6px 10px; border-radius: 20px; font-weight: 500; white-space: nowrap; cursor: pointer; min-height: 28px; -webkit-tap-highlight-color: transparent; user-select: none; }
  .badge:hover { opacity: 0.75; }
  .badge:active { opacity: 0.6; }
  .badge-wedding { background: #FBEAF0; color: #72243E; }
  .badge-editorial { background: #EEEDFE; color: #3C3489; }
  .badge-elopement { background: #E1F5EE; color: #085041; }
  .badge-fashion { background: #FAECE7; color: #712B13; }
  .badge-event { background: #FAEEDA; color: #633806; }
  .badge-other { background: var(--color-background-secondary); color: var(--color-text-secondary); }
  .status-select { font-size: 12px; padding: 3px 8px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; }
  .date-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 6px 10px; border-radius: 20px; cursor: pointer; white-space: nowrap; min-height: 28px; -webkit-tap-highlight-color: transparent; user-select: none; }
  .date-pill:hover { opacity: 0.75; }
  .date-pill:active { opacity: 0.6; }
  .date-pill .pill-label { font-weight: 500; opacity: 0.7; }
  .shoot-pill { background: #EEEDFE; color: #3C3489; }
  .shoot-pill.soon { background: #FAEEDA; color: #633806; }
  .shoot-pill.past { background: var(--color-background-secondary); color: var(--color-text-tertiary); }
  .due-overdue { background: #FCEBEB; color: #A32D2D; }
  .due-soon { background: #FAEEDA; color: #633806; }
  .due-ok { background: #EAF3DE; color: #3B6D11; }
  .due-none { background: var(--color-background-secondary); color: var(--color-text-tertiary); }
  .job.long-press { box-shadow: 0 0 0 2px var(--color-border-info); transform: scale(1.01); transition: transform 0.15s; }
  .trash-zone { position: fixed; bottom: 0; left: 0; right: 0; height: 90px; background: #FCEBEB; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; font-weight: 500; color: #A32D2D; z-index: 2000; border-top: 0.5px solid #F09595; transform: translateY(100%); transition: transform 0.2s ease; }
  .trash-zone.visible { transform: translateY(0); }
  .trash-zone.ready { background: #A32D2D; color: #ffffff; }
  .trash-icon { font-size: 22px; }
  .empty { text-align: center; padding: 2.5rem 1rem; color: var(--color-text-secondary); font-size: 14px; }
  .loading { text-align: center; padding: 2.5rem 1rem; color: var(--color-text-tertiary); font-size: 14px; }
  .setup-banner { background: var(--color-background-info); border: 0.5px solid var(--color-border-info); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.25rem; font-size: 13px; color: var(--color-text-info); line-height: 1.6; }
  .setup-banner strong { font-weight: 500; display: block; margin-bottom: 4px; font-size: 14px; }
  .setup-banner input { width: 100%; margin-top: 8px; font-size: 13px; padding: 7px 10px; border: 0.5px solid var(--color-border-info); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
  .setup-banner button { margin-top: 8px; font-size: 13px; padding: 6px 14px; border: 0.5px solid var(--color-border-info); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-info); cursor: pointer; }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .cal-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
  .cal-nav { display: flex; gap: 6px; }
  .cal-nav button { font-size: 13px; padding: 4px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-secondary); cursor: pointer; }
  .cal-nav button:hover { background: var(--color-background-secondary); }
  .cal-legend { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .cal-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--color-text-secondary); padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--color-border-tertiary); cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
  .cal-legend-item.active { border-color: var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-primary); }
  .cal-legend-item.inactive { opacity: 0.35; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 1px; background: var(--color-border-tertiary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: visible; }
  .cal-dow { background: var(--color-background-secondary); text-align: center; font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); padding: 6px 0; }
  .cal-day { background: var(--color-background-primary); min-height: 72px; padding: 6px; position: relative; }
  .cal-day.other-month { background: var(--color-background-secondary); }
  .cal-day.today .cal-day-num { background: var(--color-background-info); color: var(--color-text-info); border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
  .cal-day-num { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
  .cal-event { font-size: 10px; padding: 4px 6px; border-radius: 4px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; -webkit-tap-highlight-color: transparent; min-height: 22px; display: flex; align-items: center; }
  .cal-event:hover { opacity: 0.8; }
  .cal-sheet-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 1000; display: flex; align-items: flex-end; justify-content: center; }
  .cal-sheet { background: var(--color-background-primary); border-radius: var(--border-radius-lg) var(--border-radius-lg) 0 0; padding: 1.25rem 1.5rem 2rem; width: 100%; max-width: 480px; border-top: 0.5px solid var(--color-border-secondary); }
  .cal-sheet-handle { width: 36px; height: 4px; background: var(--color-border-secondary); border-radius: 2px; margin: 0 auto 1rem; }
  .cal-sheet-name { font-size: 16px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; }
  .cal-sheet-meta { font-size: 13px; color: var(--color-text-secondary); }
  .cal-sheet-type { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; margin-bottom: 8px; }
  .cal-sheet-type.shoot { background: #EEEDFE; color: #3C3489; }
  .cal-sheet-type.delivery { background: #EAF3DE; color: #3B6D11; }
  .cal-sheet-type.overdue { background: #FCEBEB; color: #A32D2D; }
  .cal-event.shoot-ev { background: #EEEDFE; color: #3C3489; }
  .cal-event.delivery-ev { background: #EAF3DE; color: #3B6D11; }
  .cal-event.delivery-ev.overdue { background: #FCEBEB; color: #A32D2D; }
  .ctx-menu { position: fixed; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 4px 0; z-index: 999; min-width: 160px; }
  .ctx-item { font-size: 13px; padding: 7px 14px; cursor: pointer; color: var(--color-text-primary); }
  .ctx-item:hover { background: var(--color-background-secondary); }
  .ctx-sep { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 3px 0; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.18); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 1.25rem; width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }
  .modal-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 2px; }
  .modal input { width: 100%; font-size: 14px; padding: 8px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .btn-save { font-size: 13px; padding: 6px 16px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-primary); cursor: pointer; font-weight: 500; }
  .btn-save:hover { background: var(--color-background-secondary); }
  .btn-cancel-sm { font-size: 13px; padding: 6px 12px; border: none; background: none; color: var(--color-text-secondary); cursor: pointer; }

  .undo-toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--color-text-primary); color: var(--color-background-primary); font-size: 13px; padding: 10px 16px; border-radius: 20px; display: flex; align-items: center; gap: 10px; z-index: 3000; white-space: nowrap; }
  .undo-toast button { font-size: 13px; font-weight: 500; background: none; border: none; color: #60a5fa; cursor: pointer; padding: 0; }
  .panel-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.18); display: flex; align-items: flex-end; justify-content: center; z-index: 1500; }
  .panel { background: var(--color-background-primary); border-radius: var(--border-radius-lg) var(--border-radius-lg) 0 0; padding: 1.25rem 1.5rem 2rem; width: 100%; max-width: 600px; border-top: 0.5px solid var(--color-border-secondary); max-height: 70vh; overflow-y: auto; }
  .panel-handle { width: 36px; height: 4px; background: var(--color-border-secondary); border-radius: 2px; margin: 0 auto 1rem; }
  .panel-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 1rem; }
  .panel-empty { font-size: 13px; color: var(--color-text-tertiary); text-align: center; padding: 1.5rem 0; }
  .panel-job { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 0.5px solid var(--color-border-tertiary); gap: 10px; }
  .panel-job:last-child { border-bottom: none; }
  .panel-job-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .panel-job-meta { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
  .panel-job-btn { font-size: 12px; padding: 4px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-primary); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .panel-job-btn:hover { background: var(--color-background-secondary); }
  .panel-job-btn.danger { color: var(--color-text-danger); border-color: var(--color-border-tertiary); }

  .more-btn { font-size: 20px; padding: 2px 10px; border: 0.5px solid var(--color-border-tertiary); border-radius: 20px; background: transparent; color: var(--color-text-secondary); cursor: pointer; line-height: 1; letter-spacing: 1px; }
  .more-btn:hover { background: var(--color-background-secondary); }
  .more-menu { position: fixed; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 6px 0; z-index: 999; min-width: 160px; box-shadow: none; }
  .more-menu-item { display: flex; align-items: center; gap: 10px; font-size: 13px; padding: 9px 16px; cursor: pointer; color: var(--color-text-primary); -webkit-tap-highlight-color: transparent; }
  .more-menu-item:hover { background: var(--color-background-secondary); }
  .more-menu-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
  .more-menu-sep { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 4px 0; }
</style>
</head>
<body id="root">
<div class="top-nav">
  <div class="stats" id="stats"></div>
  <div class="tab-btns">
    <span class="sync-status" id="sync-status">connecting...</span>
    <button class="tab-btn" id="refresh-btn" onclick="loadFromSheet()" title="Refresh from Google Sheets" style="padding:5px 10px;">&#8635;</button>
    <button class="tab-btn active" id="tab-queue" onclick="switchTab('queue')">Queue</button>
    <button class="tab-btn" id="tab-cal" onclick="switchTab('cal')">Calendar</button>
    <button class="more-btn" id="more-btn" onclick="toggleMoreMenu(event)" title="More">&#8943;</button>
  </div>
</div>
<div id="setup-banner" style="display:none;">
  <div class="setup-banner">
    <strong>One-time setup needed</strong>
    Paste your Google Apps Script web app URL below to enable sync.
    <input type="text" id="script-url-input" placeholder="https://script.google.com/macros/s/.../exec" />
    <button onclick="saveScriptUrl()">Save & connect</button>
  </div>
</div>
<div id="view-queue">
  <div class="add-bar-top">
    <input type="text" id="new-name" placeholder="Client or job name" />
    <select id="new-type">
      <option value="wedding">Wedding</option>
      <option value="editorial">Editorial</option>
      <option value="elopement">Elopement</option>
      <option value="fashion">Fashion</option>
      <option value="event">Event</option>
      <option value="other">Other</option>
    </select>
  </div>
  <div class="add-bar-dates">
    <div class="field-wrap"><label for="new-shoot">Shoot date</label><input type="date" id="new-shoot" /></div>
    <div class="field-wrap"><label for="new-due">Delivery date</label><input type="date" id="new-due" /></div>
    <button class="add-btn" onclick="addJob()">+ Add job</button>
  </div>
  <div class="toolbar">
    <div class="filters">
      <button class="filter-btn active" id="fb-all" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" id="fb-booked" onclick="setFilter('booked',this)">Booked</button>
      <button class="filter-btn" id="fb-culling" onclick="setFilter('culling',this)">Culling</button>
      <button class="filter-btn" id="fb-editing" onclick="setFilter('editing',this)">Editing</button>
      <button class="filter-btn" id="fb-delivery" onclick="setFilter('delivery',this)">Ready to deliver</button>
      <button class="filter-btn" id="fb-done" onclick="setFilter('done',this)">Delivered</button>
    </div>
    <div class="sort-bar">
      <span class="sort-label">Sort:</span>
      <button class="sort-btn" id="sort-date" onclick="setSort('date')">Delivery</button>
      <button class="sort-btn" id="sort-shoot" onclick="setSort('shoot')">Shoot date</button>
      <button class="sort-btn" id="sort-alpha" onclick="setSort('alpha')">A–Z</button>
      <button class="sort-btn active" id="sort-custom" onclick="setSort('custom')">Custom</button>
    </div>
  </div>
  <div class="job-list" id="job-list"><div class="loading">Loading your queue...</div></div>
</div>
<div id="trash-zone" class="trash-zone">
  <span class="trash-icon">🗑</span><span id="trash-label">drag here to delete</span>
</div>

<div id="view-cal" style="display:none;">
  <div class="cal-header">
    <div class="cal-title" id="cal-title"></div>
    <div class="cal-nav">
      <button onclick="calPrev()">&#8592;</button>
      <button onclick="calToday()">Today</button>
      <button onclick="calNext()">&#8594;</button>
    </div>
  </div>
  <div class="cal-legend">
    <div class="cal-legend-item active" id="leg-shoot" onclick="toggleLegend('shoot')"><div class="legend-dot" style="background:#AFA9EC;"></div>shoot date</div>
    <div class="cal-legend-item active" id="leg-delivery" onclick="toggleLegend('delivery')"><div class="legend-dot" style="background:#97C459;"></div>delivery date</div>
    <div class="cal-legend-item active" id="leg-overdue" onclick="toggleLegend('overdue')"><div class="legend-dot" style="background:#F09595;"></div>overdue delivery</div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>
<script>
const STATUSES=['booked','culling','editing','delivery','done'];
const STATUS_LABELS={booked:'Booked',culling:'Culling',editing:'Editing',delivery:'Ready to deliver',done:'Delivered'};
const TYPES=['wedding','editorial','elopement','fashion','event','other'];
const DOWS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
let jobs=[];
let nextId=1;
let activeFilter='all';
let sortMode=localStorage.getItem('bn_sort')||'custom';
let dragId=null,dragOverId=null;
let activeTab='queue';
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
let calFilters={shoot:true,delivery:true,overdue:true};
let openMenuId=null;
let syncTimeout=null;
let SCRIPT_URL=localStorage.getItem('bn_script_url')||'';
function setSyncStatus(state,msg){
  const el=document.getElementById('sync-status');
  el.className='sync-status'+(state?' '+state:'');
  el.textContent=msg;
}
function saveScriptUrl(){
  const val=document.getElementById('script-url-input').value.trim();
  if(!val) return;
  SCRIPT_URL=val;
  localStorage.setItem('bn_script_url',val);
  document.getElementById('setup-banner').style.display='none';
  loadFromSheet();
}
async function loadFromSheet(){
  if(!SCRIPT_URL){ document.getElementById('setup-banner').style.display='block'; setSyncStatus('error','not connected'); renderList(); return; }
  if(syncTimeout){ clearTimeout(syncTimeout); syncTimeout=null; await pushToSheet(); }
  while(isSaving){ await new Promise(r=>setTimeout(r,100)); }
  setSyncStatus('syncing','syncing...');
  try {
    const res=await fetch(SCRIPT_URL+'?action=get');
    const data=await res.json();
    if(data.jobs){
      jobs=data.jobs.map(j=>({...j,id:Number(j.id)}));
      jobs.forEach(j=>{ if(!('shoot' in j)) j.shoot=''; });
      nextId=jobs.length?Math.max(...jobs.map(j=>j.id))+1:1;
      setSyncStatus('','synced');
    }
  } catch(e){ setSyncStatus('error','sync failed'); }
  render();
}
function scheduleSave(){
  clearTimeout(syncTimeout);
  syncTimeout=setTimeout(()=>{ syncTimeout=null; pushToSheet(); },1000);
}
async function pushToSheet(){
  if(!SCRIPT_URL||isSaving) return;
  isSaving=true;
  setSyncStatus('syncing','saving...');
  const snapshot=JSON.parse(JSON.stringify(jobs));
  try {
    const res=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'save',jobs:snapshot})});
    const data=await res.json();
    if(data.ok) setSyncStatus('','saved');
    else setSyncStatus('error','save failed');
  } catch(e){ setSyncStatus('error','save failed'); }
  isSaving=false;
}
function save(){
  localStorage.setItem('bn_sort',sortMode);
  scheduleSave();
}
function switchTab(tab){
  activeTab=tab;
  const qv=document.getElementById('view-queue');
  const cv=document.getElementById('view-cal');
  if(tab==='queue'){ qv.style.display='block'; cv.style.display='none'; }
  else { qv.style.display='none'; cv.style.display='block'; }
  document.getElementById('tab-queue').classList.toggle('active',tab==='queue');
  document.getElementById('tab-cal').classList.toggle('active',tab==='cal');
  if(tab==='cal') setTimeout(renderCal,50);
}
function getSorted(){
  let list;
  if(activeFilter==='all') list=[...jobs];
  else if(activeFilter==='overdue'){
    const now=new Date();
    list=jobs.filter(j=>j.due&&j.status!=='done'&&parseDate(j.due)<now);
  } else list=jobs.filter(j=>j.status===activeFilter);
  if(sortMode==='date') return list.sort((a,b)=>{ if(!a.due&&!b.due) return 0; if(!a.due) return 1; if(!b.due) return -1; return parseDate(a.due)-parseDate(b.due); });
  if(sortMode==='shoot') return list.sort((a,b)=>{ if(!a.shoot&&!b.shoot) return 0; if(!a.shoot) return 1; if(!b.shoot) return -1; return parseDate(a.shoot)-parseDate(b.shoot); });
  if(sortMode==='alpha') return list.sort((a,b)=>a.name.localeCompare(b.name));
  return list;
}
function toKey(str){ const d=parseDate(str); if(!d) return null; return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function parseDate(str){
  if(!str) return null;
  const s=String(str).trim();
  const iso=s.match(/^([0-9]{4})-([0-9]{2})-([0-9]{2})$/);
  if(iso) return new Date(Number(iso[1]),Number(iso[2])-1,Number(iso[3]));
  const d=new Date(s);
  return isNaN(d.getTime())?null:d;
}
function shootBadge(id,shoot){
  const base=`onclick="editShoot(${id})"`;
  if(!shoot) return `<span class="date-pill shoot-pill past" ${base}><span class="pill-label">shoot</span>+ add</span>`;
  const d=parseDate(shoot); if(!d) return `<span class="date-pill shoot-pill past" ${base}><span class="pill-label">shoot</span>+ add</span>`;
  const now=new Date(); now.setHours(0,0,0,0);
  const diff=Math.round((d-now)/86400000);
  const label=d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  if(diff<0) return `<span class="date-pill shoot-pill past" ${base}><span class="pill-label">shot</span>${label}</span>`;
  if(diff<=7) return `<span class="date-pill shoot-pill soon" ${base}><span class="pill-label">shoot</span>in ${diff}d</span>`;
  return `<span class="date-pill shoot-pill" ${base}><span class="pill-label">shoot</span>${label}</span>`;
}
function dueBadge(id,due){
  const base=`onclick="editDue(${id})"`;
  if(!due) return `<span class="date-pill due-none" ${base}><span class="pill-label">delivery</span>+ add</span>`;
  const d=parseDate(due); if(!d) return `<span class="date-pill due-none" ${base}><span class="pill-label">delivery</span>+ add</span>`;
  const now=new Date(); now.setHours(0,0,0,0);
  const diff=Math.round((d-now)/86400000);
  if(diff<0) return `<span class="date-pill due-overdue" ${base}><span class="pill-label">delivery</span>${Math.abs(diff)}d overdue</span>`;
  if(diff<=5) return `<span class="date-pill due-soon" ${base}><span class="pill-label">delivery</span>in ${diff}d</span>`;
  return `<span class="date-pill due-ok" ${base}><span class="pill-label">delivery</span>${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>`;
}
function setFilter(f,el){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  else { const fb=document.getElementById('fb-'+f); if(fb) fb.classList.add('active'); }
  renderStats(); renderList(); if(activeTab==='cal') renderCal();
}
function renderStats(){
  const counts={};
  STATUSES.forEach(s=>{ counts[s]=jobs.filter(j=>j.status===s).length; });
  const overdue=jobs.filter(j=>j.due&&j.status!=='done'&&parseDate(j.due)<new Date()).length;
  const statDefs=[
    {label:'all',filter:'all',count:jobs.length},
    {label:'booked',filter:'booked',count:counts.booked},
    {label:'culling',filter:'culling',count:counts.culling},
    {label:'editing',filter:'editing',count:counts.editing},
    {label:'ready to deliver',filter:'delivery',count:counts.delivery},
    {label:'delivered',filter:'done',count:counts.done},
  ];
  if(overdue) statDefs.push({label:'overdue',filter:'overdue',count:overdue,danger:true});
  document.getElementById('stats').innerHTML=statDefs.map(s=>`
    <div class="stat ${activeFilter===s.filter?'active':''}" onclick="setFilter('${s.filter}',null)">
      <span ${s.danger?'style="color:var(--color-text-danger)"':''}>${s.count}</span>${s.label}
    </div>`).join('');
}
function renderList(){
  const filtered=getSorted(); const isCustom=sortMode==='custom';
  const list=document.getElementById('job-list');
  list.innerHTML=filtered.length?filtered.map(j=>`
    <div class="job ${j.status==='done'?'done':''} status-${j.status}" data-id="${j.id}" oncontextmenu="return false">
      <span class="job-drag ${isCustom?'':' disabled'}" onmousedown="handleDragHandleDown(event,${j.id})" ontouchstart="handleDragHandleDown(event,${j.id})">⠿</span>
      <div class="job-info" onmousedown="lpStart(event,${j.id})" ontouchstart="lpStart(event,${j.id})">
        <div class="job-name" oncontextmenu="openCtx(event,${j.id})">${j.name}</div>
        <div class="job-meta">
          <span class="badge badge-${j.type}" onclick="toggleTypeMenu(event,${j.id})" role="button">${j.type}</span>
          <select class="status-select" onchange="setStatus(${j.id},this.value)">
            ${STATUSES.map(s=>`<option value="${s}" ${j.status===s?'selected':''}>${STATUS_LABELS[s]}</option>`).join('')}
          </select>
          ${shootBadge(j.id,j.shoot)}
          ${dueBadge(j.id,j.due)}
        </div>
      </div>

    </div>`).join(''):`<div class="empty">No jobs here — add one above ↑</div>`;
  if(isCustom) attachDrag();
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  const sb=document.getElementById('sort-'+sortMode); if(sb) sb.classList.add('active');
}
function renderCal(){
  const title=new Date(calYear,calMonth,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  document.getElementById('cal-title').textContent=title;
  const grid=document.getElementById('cal-grid');
  let html=DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();
  const today=new Date(); today.setHours(0,0,0,0); const now=today.getTime();
  let filteredJobs;
  if(activeFilter==='all') filteredJobs=jobs;
  else if(activeFilter==='overdue'){ const now2=new Date(); filteredJobs=jobs.filter(j=>j.due&&j.status!=='done'&&parseDate(j.due)<now2); }
  else filteredJobs=jobs.filter(j=>j.status===activeFilter);
  const eventsByDate={};
  filteredJobs.forEach(j=>{
    if(calFilters.shoot && j.shoot){ const k=toKey(j.shoot); if(k){ if(!eventsByDate[k]) eventsByDate[k]=[]; eventsByDate[k].push({name:j.name,type:'shoot',overdue:false}); } }
    if(j.due&&j.status!=='done'){ const pd=parseDate(j.due); const k=toKey(j.due); if(pd&&k){
      const overdue=pd.getTime()<now;
      const show=(overdue&&calFilters.overdue)||(!overdue&&calFilters.delivery);
      if(show){ if(!eventsByDate[k]) eventsByDate[k]=[]; eventsByDate[k].push({name:j.name,type:'delivery',overdue}); }
    } }
  });
  const totalCells=Math.ceil((firstDay+daysInMonth)/7)*7;
  for(let i=0;i<totalCells;i++){
    let dayNum,month=calMonth,year=calYear,otherMonth=false;
    if(i<firstDay){ dayNum=daysInPrev-(firstDay-1-i); month=calMonth-1; otherMonth=true; if(month<0){month=11;year=calYear-1;} }
    else if(i>=firstDay+daysInMonth){ dayNum=i-firstDay-daysInMonth+1; month=calMonth+1; otherMonth=true; if(month>11){month=0;year=calYear+1;} }
    else{ dayNum=i-firstDay+1; }
    const d=new Date(year,month,dayNum); d.setHours(0,0,0,0);
    const isToday=d.getTime()===now;
    const key=`${year}-${String(month+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
    const evs=eventsByDate[key]||[];
    const evHtml=evs.map(e=>`<div class="cal-event ${e.type==='shoot'?'shoot-ev':'delivery-ev'}${e.overdue?' overdue':''}" data-name="${e.name}" data-type="${e.type}" data-date="${key}">${e.name}</div>`).join('');
    html+=`<div class="cal-day${otherMonth?' other-month':''}${isToday?' today':''}"><div class="cal-day-num">${dayNum}</div>${evHtml}</div>`;
  }
  grid.innerHTML=html;
  grid.onclick=function(e){
    const el=e.target.closest('.cal-event');
    if(!el) return;
    e.stopPropagation();
    closePopover();
    const name=el.getAttribute('data-name');
    const type=el.getAttribute('data-type');
    const date=el.getAttribute('data-date');
    const d=parseDate(date);
    const dateStr=d?d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}):date;
    const isOverdue=el.classList.contains('overdue');
    const typeLabel=type==='shoot'?'Shoot date':(isOverdue?'Delivery — overdue':'Delivery date');
    const typeClass=type==='shoot'?'shoot':(isOverdue?'overdue':'delivery');
    const bg=document.createElement('div');
    bg.className='cal-sheet-bg'; bg.id='cal-sheet-bg';
    bg.innerHTML='<div class="cal-sheet"><div class="cal-sheet-handle"></div><span class="cal-sheet-type '+typeClass+'">'+typeLabel+'</span><div class="cal-sheet-name">'+name+'</div><div class="cal-sheet-meta">'+dateStr+'</div></div>';
    bg.addEventListener('click',function(ev){ if(ev.target===bg) closePopover(); });
    document.body.appendChild(bg);
  };
}
function calPrev(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCal(); }
function calNext(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCal(); }
function calToday(){ calYear=new Date().getFullYear(); calMonth=new Date().getMonth(); renderCal(); }
function toggleTypeMenu(e,id){
  e.stopPropagation();
  const existing=document.getElementById('ctx-menu');
  if(existing){ const wasForSame=openMenuId===id; closeCtx(); if(wasForSame) return; }
  openMenuId=id;
  const j=jobs.find(x=>x.id===id); if(!j) return;
  const rect=e.currentTarget.getBoundingClientRect();
  const menu=document.createElement('div'); menu.className='ctx-menu'; menu.id='ctx-menu';
  menu.style.cssText=`left:${rect.left}px;top:${rect.bottom+4}px`;
  menu.innerHTML=TYPES.map(t=>`<div class="ctx-item" onclick="setType(${id},'${t}');closeCtx()">${t}${j.type===t?' ✓':''}</div>`).join('');
  document.body.appendChild(menu);
  setTimeout(()=>document.addEventListener('click',closeCtx,{once:true}),10);
}
function setType(id,type){ const j=jobs.find(x=>x.id===id); if(j){j.type=type;save();render();} }
function editShoot(id){
  const j=jobs.find(x=>x.id===id); if(!j) return;
  const bg=document.createElement('div'); bg.className='modal-bg'; bg.id='edit-modal';
  bg.innerHTML=`<div class="modal"><div class="modal-title">Shoot date</div><input id="m-shoot" type="date" value="${j.shoot||''}" /><div class="modal-actions"><button class="btn-cancel-sm" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveShoot(${id})">Save</button></div></div>`;
  bg.addEventListener('click',e=>{ if(e.target===bg) closeModal(); });
  document.body.appendChild(bg);
  setTimeout(()=>{ const el=document.getElementById('m-shoot'); if(el) el.focus(); },50);
}
function saveShoot(id){ const j=jobs.find(x=>x.id===id); if(!j) return; j.shoot=document.getElementById('m-shoot').value; closeModal(); save(); render(); }
function editDue(id){
  const j=jobs.find(x=>x.id===id); if(!j) return;
  const bg=document.createElement('div'); bg.className='modal-bg'; bg.id='edit-modal';
  bg.innerHTML=`<div class="modal"><div class="modal-title">Delivery date</div><input id="m-due" type="date" value="${j.due||''}" /><div class="modal-actions"><button class="btn-cancel-sm" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveDue(${id})">Save</button></div></div>`;
  bg.addEventListener('click',e=>{ if(e.target===bg) closeModal(); });
  document.body.appendChild(bg);
  setTimeout(()=>{ const el=document.getElementById('m-due'); if(el) el.focus(); },50);
}
function saveDue(id){ const j=jobs.find(x=>x.id===id); if(!j) return; j.due=document.getElementById('m-due').value; closeModal(); save(); render(); }
function openCtx(e,id){
  e.preventDefault(); closeCtx(); openMenuId=null;
  const menu=document.createElement('div'); menu.className='ctx-menu'; menu.id='ctx-menu';
  menu.style.cssText=`left:${e.clientX}px;top:${e.clientY}px`;
  menu.innerHTML=`<div class="ctx-item" onclick="openEditModal(${id})">Rename job</div><hr class="ctx-sep"><div class="ctx-item" style="color:var(--color-text-danger)" onclick="del(${id});closeCtx()">Delete</div>`;
  document.body.appendChild(menu);
  setTimeout(()=>document.addEventListener('click',closeCtx,{once:true}),10);
}
function closeCtx(){ const m=document.getElementById('ctx-menu'); if(m) m.remove(); openMenuId=null; }
function openEditModal(id){
  closeCtx(); const j=jobs.find(x=>x.id===id); if(!j) return;
  const bg=document.createElement('div'); bg.className='modal-bg'; bg.id='edit-modal';
  bg.innerHTML=`<div class="modal"><div class="modal-title">Rename job</div><input id="m-name" type="text" value="${j.name}" placeholder="Job name" /><div class="modal-actions"><button class="btn-cancel-sm" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveModal(${id})">Save</button></div></div>`;
  bg.addEventListener('click',e=>{ if(e.target===bg) closeModal(); });
  document.body.appendChild(bg);
  setTimeout(()=>{ const el=document.getElementById('m-name'); if(el){el.focus();el.select();} },50);
}
function closeModal(){ const m=document.getElementById('edit-modal'); if(m) m.remove(); }
function saveModal(id){ const j=jobs.find(x=>x.id===id); if(!j) return; const name=document.getElementById('m-name').value.trim(); if(!name) return; j.name=name; closeModal(); save(); render(); }
function addJob(){
  const name=document.getElementById('new-name').value.trim(); if(!name){document.getElementById('new-name').focus();return;}
  nextId=jobs.length?Math.max(...jobs.map(j=>j.id))+1:1;
  jobs.unshift({id:nextId++,name,type:document.getElementById('new-type').value,status:'booked',shoot:document.getElementById('new-shoot').value,due:document.getElementById('new-due').value});
  document.getElementById('new-name').value=''; document.getElementById('new-shoot').value=''; document.getElementById('new-due').value='';
  save(); render();
}
function setStatus(id,status){ const j=jobs.find(x=>x.id===id); if(j){j.status=status;save();render();} }
function del(id){
  const j=jobs.find(x=>x.id===id); if(!j) return;
  jobs=jobs.filter(x=>x.id!==id);
  trashedJobs.unshift({...j, deletedAt: new Date().toISOString()});
  localStorage.setItem('bn_trash', JSON.stringify(trashedJobs));
  save(); render();
  showUndo(j);
}
function showUndo(j){
  clearTimeout(undoTimer);
  undoJob=j;
  let el=document.getElementById('undo-toast');
  if(!el){ el=document.createElement('div'); el.className='undo-toast'; el.id='undo-toast'; document.body.appendChild(el); }
  el.innerHTML='"'+j.name+'" deleted <button onclick="undoDelete()">Undo</button>';
  el.style.display='flex';
  undoTimer=setTimeout(()=>{ el.style.display='none'; undoJob=null; }, 4000);
}
function undoDelete(){
  clearTimeout(undoTimer);
  if(!undoJob) return;
  jobs.unshift(undoJob);
  trashedJobs=trashedJobs.filter(j=>j.id!==undoJob.id);
  localStorage.setItem('bn_trash', JSON.stringify(trashedJobs));
  undoJob=null;
  document.getElementById('undo-toast').style.display='none';
  save(); render();
}
function attachDrag(){
  document.querySelectorAll('.job').forEach(el=>{
    el.setAttribute('draggable','true');
    el.addEventListener('dragstart',e=>{ if(lpDragging){e.preventDefault();return;} dragId=parseInt(el.dataset.id); el.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',dragId); });
    el.addEventListener('dragend',()=>{ el.classList.remove('dragging'); document.querySelectorAll('.job').forEach(j=>j.classList.remove('drag-over')); });
    el.addEventListener('dragover',e=>{ e.preventDefault(); document.querySelectorAll('.job').forEach(j=>j.classList.remove('drag-over')); el.classList.add('drag-over'); dragOverId=parseInt(el.dataset.id); });
    el.addEventListener('drop',e=>{ e.preventDefault(); el.classList.remove('drag-over'); if(dragId===null||dragId===dragOverId) return; const from=jobs.findIndex(j=>j.id===dragId),to=jobs.findIndex(j=>j.id===dragOverId); if(from<0||to<0) return; const[item]=jobs.splice(from,1); jobs.splice(to,0,item); dragId=null; dragOverId=null; save(); render(); });
  });
}
function setSort(mode){ sortMode=mode; save(); render(); }
function render(){ renderStats(); renderList(); if(activeTab==='cal') renderCal(); }

function toggleLegend(type){
  calFilters[type]=!calFilters[type];
  const el=document.getElementById('leg-'+type);
  if(el){ el.classList.toggle('active',calFilters[type]); el.classList.toggle('inactive',!calFilters[type]); }
  renderCal();
}



function toggleMoreMenu(e){
  e.stopPropagation();
  const existing=document.getElementById('more-menu');
  if(existing){ existing.remove(); return; }
  const btn=document.getElementById('more-btn');
  const rect=btn.getBoundingClientRect();
  const menu=document.createElement('div');
  menu.className='more-menu'; menu.id='more-menu';
  menu.style.cssText=`right:${window.innerWidth-rect.right}px;top:${rect.bottom+6}px`;
  menu.innerHTML=`
    <div class="more-menu-item" onclick="openArchive();closeMoreMenu()">
      <span class="more-menu-icon">&#128451;</span>Archive
    </div>
    <hr class="more-menu-sep">
    <div class="more-menu-item" onclick="openTrash();closeMoreMenu()">
      <span class="more-menu-icon">&#128465;</span>Trash
    </div>`;
  document.body.appendChild(menu);
  setTimeout(()=>document.addEventListener('click',closeMoreMenu,{once:true}),10);
}
function closeMoreMenu(){ const m=document.getElementById('more-menu'); if(m) m.remove(); }

function archiveJob(id){
  const j=jobs.find(x=>x.id===id); if(!j) return;
  jobs=jobs.filter(x=>x.id!==id);
  archivedJobs.unshift({...j, archivedAt: new Date().toISOString()});
  localStorage.setItem('bn_archive', JSON.stringify(archivedJobs));
  save(); render(); closePanel();
}
function restoreFromTrash(id){
  const j=trashedJobs.find(x=>x.id===id); if(!j) return;
  trashedJobs=trashedJobs.filter(x=>x.id!==id);
  localStorage.setItem('bn_trash', JSON.stringify(trashedJobs));
  jobs.unshift(j);
  save(); render(); closePanel();
}
function permanentDelete(id){
  trashedJobs=trashedJobs.filter(x=>x.id!==id);
  localStorage.setItem('bn_trash', JSON.stringify(trashedJobs));
  closePanel(); openTrash();
}
function restoreFromArchive(id){
  const j=archivedJobs.find(x=>x.id===id); if(!j) return;
  archivedJobs=archivedJobs.filter(x=>x.id!==id);
  localStorage.setItem('bn_archive', JSON.stringify(archivedJobs));
  jobs.unshift(j);
  save(); render(); closePanel();
}
function openTrash(){
  closePanel();
  const bg=document.createElement('div'); bg.className='panel-bg'; bg.id='panel-bg';
  const items=trashedJobs.length ? trashedJobs.map(j=>`
    <div class="panel-job">
      <div><div class="panel-job-name">${j.name}</div><div class="panel-job-meta">${j.type} &middot; ${STATUS_LABELS[j.status]||j.status}</div></div>
      <div style="display:flex;gap:6px;">
        <button class="panel-job-btn" onclick="restoreFromTrash(${j.id})">Restore</button>
        <button class="panel-job-btn danger" onclick="permanentDelete(${j.id})">Delete forever</button>
      ${j.status==='done'?`<button class="panel-job-btn" style="font-size:11px;padding:3px 8px;flex-shrink:0;" onclick="archiveJob(${j.id})">Archive</button>`:''}
    </div>`).join('') : '<div class="panel-empty">Trash is empty</div>';
  bg.innerHTML=`<div class="panel"><div class="panel-handle"></div><div class="panel-title">Trash</div>${items}</div>`;
  bg.addEventListener('click',e=>{ if(e.target===bg) closePanel(); });
  document.body.appendChild(bg);
}
function openArchive(){
  closePanel();
  const bg=document.createElement('div'); bg.className='panel-bg'; bg.id='panel-bg';
  const items=archivedJobs.length ? archivedJobs.map(j=>`
    <div class="panel-job">
      <div><div class="panel-job-name">${j.name}</div><div class="panel-job-meta">${j.type} &middot; archived</div></div>
      <button class="panel-job-btn" onclick="restoreFromArchive(${j.id})">Restore</button>
    </div>`).join('') : '<div class="panel-empty">No archived jobs yet</div>';
  bg.innerHTML=`<div class="panel"><div class="panel-handle"></div><div class="panel-title">Archive</div>${items}</div>`;
  bg.addEventListener('click',e=>{ if(e.target===bg) closePanel(); });
  document.body.appendChild(bg);
}
function closePanel(){ const p=document.getElementById('panel-bg'); if(p) p.remove(); }

function closePopover() { const p = document.getElementById('cal-sheet-bg'); if (p) p.remove(); }


let lpTimer=null, lpJobId=null, lpDragging=false, lpStartY=0, lpEl=null;
let isSaving=false;
let trashedJobs=JSON.parse(localStorage.getItem('bn_trash')||'[]');
let archivedJobs=JSON.parse(localStorage.getItem('bn_archive')||'[]');
let undoJob=null, undoTimer=null;
const LONG_PRESS_MS=500;


function handleDragHandleDown(e, id){
  e.stopPropagation();
  const jobEl = e.currentTarget.closest('.job');
  if(!jobEl) return;
  jobEl.setAttribute('draggable', 'true');
  dragId = id;
}

function lpStart(e,id){
  e.stopPropagation();
  if(e.cancelable) e.preventDefault();
  if(e.touches) window.getSelection&&window.getSelection().removeAllRanges();
  const touch=e.touches?e.touches[0]:e;
  lpStartY=touch.clientY;
  lpJobId=id;
  lpEl=e.currentTarget.closest('.job');
  lpTimer=setTimeout(()=>{
    lpDragging=true;
    if(e.touches) window.getSelection&&window.getSelection().removeAllRanges();
    lpEl.classList.add('long-press');
    document.getElementById('trash-zone').classList.add('visible');
    navigator.vibrate&&navigator.vibrate(40);
  },LONG_PRESS_MS);
}
function lpMove(e){
  if(!lpDragging) return;
  if(e.cancelable) e.preventDefault();
  const touch=e.touches?e.touches[0]:e;
  const tz=document.getElementById('trash-zone');
  const inZone=touch.clientY>window.innerHeight-90;
  tz.classList.toggle('ready',inZone);
  document.getElementById('trash-label').textContent=inZone?'release to delete':'drag here to delete';
}
function lpEnd(e){
  clearTimeout(lpTimer);
  if(!lpDragging){ lpJobId=null; lpEl=null; return; }
  const touch=e.changedTouches?e.changedTouches[0]:e;
  const inZone=touch.clientY>window.innerHeight-90;
  if(inZone&&lpJobId!==null) del(lpJobId);
  lpDragging=false;
  if(lpEl){ lpEl.classList.remove('long-press'); lpEl=null; }
  const tz=document.getElementById('trash-zone');
  tz.classList.remove('visible','ready');
  document.getElementById('trash-label').textContent='drag here to delete';
  lpJobId=null;
}
function lpCancel(){
  clearTimeout(lpTimer);
  if(lpEl) lpEl.classList.remove('long-press');
  lpDragging=false; lpJobId=null; lpEl=null;
  const tz=document.getElementById('trash-zone');
  tz.classList.remove('visible','ready');
}
document.addEventListener('touchmove',lpMove,{passive:false});
document.addEventListener('touchend',lpEnd);
document.addEventListener('touchcancel',lpCancel);
document.addEventListener('mousemove',lpMove);
document.addEventListener('mouseup',lpEnd);

document.getElementById('new-name').addEventListener('keydown',e=>{ if(e.key==='Enter') addJob(); });
loadFromSheet();
</script>
